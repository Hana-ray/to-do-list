<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart To-Do List App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Smart To-Do List</h1>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Enter a new task">
      <input type="date" id="dueDateInput">
      <select id="priorityInput">
        <option value="Low">Low Priority</option>
        <option value="Medium">Medium Priority</option>
        <option value="High">High Priority</option>
      </select>
      <button id="addTaskBtn">Add Task</button>
    </div>

    <div class="summary-box">
      <p id="taskCount">Total: 0</p>
      <p id="completedCount">Completed: 0</p>
      <p id="pendingCount">Pending: 0</p>
    </div>

    <div class="todo-info">
      <button id="allBtn">All</button>
      <button id="pendingBtn">Pending</button>
      <button id="completedBtn">Completed</button>
      <button id="clearCompletedBtn">Clear Completed</button>
    </div>

    <p id="emptyMessage">No tasks yet. Add your first task.</p>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
